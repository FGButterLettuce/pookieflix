services:
  pookieflix:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATA_DIR: /data
      MEDIA_DIR: /data/media
      DB_PATH: /data/app.db
      # Override any setting from the web UI by setting it here.
      # APP_BASE_URL: "https://watch.yourdomain.com"
      # UPLOAD_URL: "http://192.168.0.91:3000"
      # OPENSUBTITLES_API_KEY: "your-key-here"
      # MAX_UPLOAD_BYTES: "10737418240"
      # cloudflared is bundled in the image and managed by the server itself
      # once a token is set (via the wizard, Settings, or here) — no separate
      # tunnel container/profile needed.
      # TUNNEL_TOKEN: "your-token-here"
