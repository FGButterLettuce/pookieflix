services:
  watchtogether:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/library"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # All settings below are optional — configure via the web UI on first run instead.
    # Env vars take precedence over UI settings if set here.
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATA_DIR: /data
      MEDIA_DIR: /data/media
      DB_PATH: /data/app.db
      # APP_BASE_URL: "https://watch.yourdomain.com"
      # UPLOAD_URL: "http://192.168.0.91:3000"
      # OPENSUBTITLES_API_KEY: "your-key-here"
      # MAX_UPLOAD_BYTES: "10737418240"
      # ROOM_TTL_HOURS: "24"
